name: probe
on:
  push:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: run bench (fugu side)
        env:
          SK: ${{ secrets.SK }}
        run: python bench.py
      - name: upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results.json
          if-no-files-found: warn
