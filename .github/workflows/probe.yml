name: probe
on:
  push:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: fugu-ultra grows minilang (agentic, spends credits)
        env:
          SK: ${{ secrets.SK }}
          MAX_CALLS: '15'
        run: python -u agent_grow.py
      - name: upload grown project
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minilang_grown
          path: |
            minilang.py
            transcript.json
            added.txt
          if-no-files-found: warn
