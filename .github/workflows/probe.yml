name: probe
on:
  push:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: fugu-ultra via Responses API
        env:
          SK: ${{ secrets.SK }}
          CODE_PROMPT: ${{ secrets.CODE_PROMPT }}
        run: python -u ultra_responses.py
      - name: upload ultra results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ultra_code
          path: ultra_results.json
          if-no-files-found: warn
