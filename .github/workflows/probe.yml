name: probe
on:
  push:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: build-from-scratch (fugu + fugu-ultra)
        env:
          SK: ${{ secrets.SK }}
        run: python -u build_bench.py
      - name: upload build results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build_results
          path: build_results.json
          if-no-files-found: warn
