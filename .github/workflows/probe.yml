name: probe
on:
  push:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: run coding field-test (fugu side)
        env:
          SK: ${{ secrets.SK }}
          CODE_PROMPT: ${{ secrets.CODE_PROMPT }}
        run: python code_bench.py
      - name: upload code results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code_results
          path: code_results.json
          if-no-files-found: warn
